<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient for a premium classical finish -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4E0A5" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep Imperial Navy Background -->
  <rect width="512" height="512" rx="128" fill="#080C1E" />
  
  <!-- Outer Gold Border ring -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="url(#gold-grad)" stroke-width="6" opacity="0.6" />
  
  <!-- Classic Laurel Wreath (Right Side) -->
  <g filter="url(#glow)">
    <path d="M 256,410 C 350,410 400,340 400,250 C 400,160 350,102 256,102" fill="none" stroke="url(#gold-grad)" stroke-width="6" stroke-dasharray="1 1" />
    
    <!-- Leaves (Right Side) -->
    <path d="M 270,396 Q 310,390 320,366 Q 300,360 270,396" fill="url(#gold-grad)" />
    <path d="M 310,360 Q 350,340 350,314 Q 326,308 310,360" fill="url(#gold-grad)" />
    <path d="M 340,310 Q 380,280 376,252 Q 350,254 340,310" fill="url(#gold-grad)" />
    <path d="M 350,250 Q 380,210 370,186 Q 346,196 350,250" fill="url(#gold-grad)" />
    <path d="M 340,190 Q 360,150 342,130 Q 324,146 340,190" fill="url(#gold-grad)" />
    <path d="M 300,138 Q 310,100 290,88 Q 278,110 300,138" fill="url(#gold-grad)" />

    <!-- Classic Laurel Wreath (Left Side) -->
    <path d="M 256,410 C 162,410 112,340 112,250 C 112,160 162,102 256,102" fill="none" stroke="url(#gold-grad)" stroke-width="6" stroke-dasharray="1 1" />
    
    <!-- Leaves (Left Side) -->
    <path d="M 242,396 Q 202,390 192,366 Q 212,360 242,396" fill="url(#gold-grad)" />
    <path d="M 202,360 Q 162,340 162,314 Q 186,308 202,360" fill="url(#gold-grad)" />
    <path d="M 172,310 Q 132,280 136,252 Q 162,254 172,310" fill="url(#gold-grad)" />
    <path d="M 162,250 Q 132,210 142,186 Q 166,196 162,250" fill="url(#gold-grad)" />
    <path d="M 172,190 Q 152,150 170,130 Q 188,146 172,190" fill="url(#gold-grad)" />
    <path d="M 212,138 Q 202,100 222,88 Q 234,110 212,138" fill="url(#gold-grad)" />
  </g>

  <!-- Large Roman Capital 'V' in Cinzel/Roman style -->
  <g fill="url(#gold-grad)" filter="url(#glow)">
    <path d="M 186,170 L 226,170 L 256,310 L 286,170 L 326,170 L 276,350 L 236,350 Z" />
    <!-- Serif decorations for V -->
    <rect x="176" y="170" width="20" height="6" rx="1" />
    <rect x="316" y="170" width="20" height="6" rx="1" />
    <rect x="226" y="344" width="60" height="6" rx="1" />
  </g>
</svg>
